version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - NODE_ENV=production
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-info}
    container_name: boltdiy-v2-app
    image: boltdiy-v2:latest
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - boltdiy-network
    labels:
      - "com.boltdiy.service=app"
      - "com.boltdiy.version=2.0"

networks:
  boltdiy-network:
    driver: bridge
    name: boltdiy-network

volumes:
  node_modules:
    driver: local
